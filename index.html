<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись к мастеру маникюра</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; }
    label { display: block; margin-top: 10px; }
    input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px 20px; }
    .message { margin-top: 15px; padding: 10px; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
<h2>Онлайн-запись к мастеру маникюра</h2>
<form id="bookingForm">
  <label>Дата *</label>
  <input type="date" id="date" required>

  <label>Время *</label>
  <input type="time" id="time" required>

  <label>Ваше имя *</label>
  <input type="text" id="name" required placeholder="Анна">

  <label>Телефон *</label>
  <input type="tel" id="phone" required placeholder="+7 (900) 123-45-67">

  <label>Услуга</label>
  <select id="service">
    <option value="">Выберите услугу</option>
    <option>Маникюр</option>
    <option>Педикюр</option>
    <option>Маникюр + покрытие</option>
    <option>Наращивание</option>
  </select>

  <label>Комментарий</label>
  <textarea id="comment" rows="3" placeholder="Ваши пожелания..."></textarea>

  <button type="submit">Записаться</button>
</form>

<div id="message" class="message" style="display: none;"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxx3m9x9XKvCBNdms7V3fkUtJXPn-ekkThnug07SuXlloeP7ji9BXnEEq_j_-SwU0yejQ/exec';  // ← ВСТАВЬТЕ СЮДА СВОЙ URL

  const form = document.getElementById('bookingForm');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Собираем данные
    const bookingData = {
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      name: document.getElementById('name').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      service: document.getElementById('service').value,
      comment: document.getElementById('comment').value.trim()
    };

    // Простейшая локальная проверка (на случай отключенного required)
    if (!bookingData.date || !bookingData.time || !bookingData.name || !bookingData.phone) {
      showMessage('Пожалуйста, заполните все обязательные поля.', 'error');
      return;
    }

    // Отправляем запрос
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(bookingData)
      });

      const result = await response.json();

      if (result.status === 'success') {
        showMessage(result.message || 'Запись успешна!', 'success');
        form.reset();  // очищаем форму
      } else {
        showMessage(result.message || 'Не удалось создать запись.', 'error');
      }
    } catch (error) {
      console.error('Ошибка сети:', error);
      showMessage('Ошибка соединения. Проверьте интернет и попробуйте снова.', 'error');
    }
  });

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = 'block';
    setTimeout(() => { messageDiv.style.display = 'none'; }, 7000);
  }
</script>
</body>
</html>
