<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись к мастеру</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #f5e6f0, #e6f0f5);
      margin: 0;
    }
    #booking-widget {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1, h2 { color: #c2185b; }
    input, button {
      margin: 10px 0;
      padding: 14px;
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    button {
      background: #e91e63;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #c2185b; }
    #slots-container button {
      margin: 6px 6px 6px 0;
      padding: 12px 20px;
      background: #f8bbd0;
      color: #c2185b;
    }
    #slots-container button:hover {
      background: #e91e63;
      color: white;
    }
    .booking-item {
      background: #f9f9f9;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cancel-btn {
      background: #d32f2f;
      padding: 6px 12px;
      font-size: 14px;
    }
    #message { margin-top: 15px; font-weight: 500; min-height: 24px; }
  </style>
</head>
<body>

<div id="booking-widget">
  <h1>Запись к мастеру</h1>

  <label for="date-picker"><strong>Выберите дату:</strong></label><br><br>
  <input type="date" id="date-picker">

  <div id="slots-container" style="margin: 20px 0;"></div>

  <form id="booking-form" style="display: none;">
    <input type="text" id="client-name" placeholder="Ваше имя" required>
    <input type="tel" id="client-phone" placeholder="Телефон" required>
    <button type="submit">Записаться</button>
  </form>

  <div id="message"></div>

  <hr style="margin: 30px 0;">
  <h2>Все записи</h2>
  <div id="all-bookings"></div>
</div>

<script>
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbypcQkHuk5U6TJViR2RgnEzqQgMu9Iqh_SwCkD51TigM4RbHgwVj4vPB2C1Vmk8PTNOGQ/exec';

  let selectedDate, selectedTime;

  const datePicker = document.getElementById('date-picker');
  const slotsContainer = document.getElementById('slots-container');
  const bookingForm = document.getElementById('booking-form');
  const messageDiv = document.getElementById('message');
  const allBookingsDiv = document.getElementById('all-bookings');

  async function apiCall(url, method = 'GET', body = null) {
    try {
      const options = { method };
      if (body) {
        options.headers = { 'Content-Type': 'application/json' };
        options.body = JSON.stringify(body);
      }
      const resp = await fetch(url, options);
      return await resp.json();
    } catch (e) {
      console.error(e);
      return { success: false, error: 'Ошибка соединения' };
    }
  }

  datePicker.addEventListener('change', async () => {
    selectedDate = datePicker.value;
    if (!selectedDate) return;

    messageDiv.textContent = 'Загрузка слотов...';
    slotsContainer.innerHTML = '';

    const result = await apiCall(`${BACKEND_URL}?action=getSlots&date=${selectedDate}`);

    if (result.error) {
      slotsContainer.innerHTML = `<p style="color:red;">${result.error}</p>`;
      return;
    }

    if (!result || result.length === 0) {
      slotsContainer.innerHTML = '<p>На эту дату нет свободных слотов.</p>';
      return;
    }

    result.forEach(slot => {
      if (slot.available) {
        const btn = document.createElement('button');
        btn.textContent = slot.time;
        btn.addEventListener('click', () => {
          selectedTime = slot.time;
          bookingForm.style.display = 'block';
          messageDiv.textContent = `Выбрано: ${slot.time}`;
        });
        slotsContainer.appendChild(btn);
      }
    });
  });

  bookingForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('client-name').value.trim();
    const phone = document.getElementById('client-phone').value.trim();

    if (!name || !phone || !selectedTime) {
      messageDiv.textContent = 'Заполните все поля!';
      return;
    }

    const result = await apiCall(BACKEND_URL, 'POST', {
      action: 'bookSlot',
      date: selectedDate,
      time: selectedTime,
      name: name,
      phone: phone
    });

    if (result.success) {
      messageDiv.style.color = 'green';
      messageDiv.textContent = `✅ ${name}, вы записаны на ${selectedDate} в ${selectedTime}!`;
      bookingForm.style.display = 'none';
      loadBookings(); // обновляем список
    } else {
      messageDiv.style.color = 'red';
      messageDiv.textContent = 'Ошибка: ' + (result.error || 'Неизвестная ошибка');
    }
  });

  // Загрузка всех записей (локально для отображения)
  function loadBookings() {
    // Можно сделать отдельный запрос, но для простоты оставляем localStorage
    const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
    allBookingsDiv.innerHTML = bookings.length ? '' : '<p>Пока нет записей.</p>';

    bookings.forEach((b, i) => {
      const div = document.createElement('div');
      div.className = 'booking-item';
      div.innerHTML = `${b.date} ${b.time} — ${b.name}`;
      allBookingsDiv.appendChild(div);
    });
  }

  loadBookings();
</script>

</body>
</html>
