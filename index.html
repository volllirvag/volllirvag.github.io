<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись к мастеру</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f9f9f9;
    }
    #booking-widget {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      margin: 10px 0;
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      background: #e91e63;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #c2185b; }
    #slots-container button {
      margin: 5px;
      padding: 10px 15px;
    }
  </style>
</head>
<body>

<div id="booking-widget">
  <h2>Запись к мастеру</h2>
  <label for="date-picker"><strong>Выберите дату:</strong></label><br><br>
  <input type="date" id="date-picker">

  <div id="slots-container" style="margin: 20px 0;"></div>

  <form id="booking-form" style="display: none;">
    <input type="text" id="client-name" placeholder="Ваше имя" required>
    <input type="tel" id="client-phone" placeholder="Телефон" required>
    <button type="submit">Записаться</button>
  </form>

  <div id="message" style="margin-top: 15px; font-weight: bold;"></div>
</div>

<script>
  const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzPcSXUHbD2C8ytcJe6pnJL-nICwSUIXckltabU1dT3OrYy48qqsTCCOa7dYDjdZQTH/exec';

  let selectedDate, selectedTime;

  const datePicker = document.getElementById('date-picker');
  const slotsContainer = document.getElementById('slots-container');
  const bookingForm = document.getElementById('booking-form');
  const messageDiv = document.getElementById('message');

  // Более надёжный прокси
  async function fetchWithProxy(url) {
    try {
      const proxy = 'https://api.allorigins.win/get?url=';
      const response = await fetch(proxy + encodeURIComponent(url));
      const data = await response.json();
      return {
        ok: true,
        json: async () => JSON.parse(data.contents)
      };
    } catch (e) {
      throw new Error('Прокси не работает');
    }
  }

  datePicker.addEventListener('change', async () => {
    selectedDate = datePicker.value;
    if (!selectedDate) return;

    messageDiv.textContent = 'Загрузка слотов...';
    slotsContainer.innerHTML = '';

    try {
      const url = `${BACKEND_URL}?action=getSlots&date=${selectedDate}`;
      const resp = await fetchWithProxy(url);
      const slots = await resp.json();

      if (!slots || slots.length === 0) {
        slotsContainer.innerHTML = '<p>На эту дату нет свободных слотов.</p>';
        return;
      }

      slots.forEach(slot => {
        if (slot.available) {
          const btn = document.createElement('button');
          btn.textContent = slot.time;
          btn.addEventListener('click', () => {
            selectedTime = slot.time;
            bookingForm.style.display = 'block';
            messageDiv.textContent = `Выбрано: ${slot.time}`;
          });
          slotsContainer.appendChild(btn);
        }
      });

    } catch (err) {
      console.error(err);
      slotsContainer.innerHTML = `<p style="color:red;">Ошибка загрузки слотов. Попробуйте позже.</p>`;
    }
  });

  // ... (остальная часть submit остаётся такой же)
  bookingForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('client-name').value.trim();
    const phone = document.getElementById('client-phone').value.trim();

    if (!name || !phone || !selectedTime) {
      messageDiv.textContent = 'Заполните все поля!';
      return;
    }

    messageDiv.textContent = 'Отправка...';

    try {
      const url = BACKEND_URL;
      const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);

      const resp = await fetch(proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'bookSlot',
          date: selectedDate,
          time: selectedTime,
          name: name,
          phone: phone
        })
      });

      const data = await resp.json();
      const result = JSON.parse(data.contents);

      if (result.success) {
        messageDiv.style.color = 'green';
        messageDiv.textContent = '✅ Вы успешно записаны!';
        bookingForm.style.display = 'none';
      } else {
        messageDiv.style.color = 'red';
        messageDiv.textContent = 'Ошибка: ' + (result.error || 'Неизвестная ошибка');
      }
    } catch (err) {
      messageDiv.style.color = 'red';
      messageDiv.textContent = 'Ошибка соединения';
    }
  });
</script>

</body>
</html>
