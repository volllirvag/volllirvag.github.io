<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись к мастеру маникюра</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 20px auto; padding: 0 15px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 25px; padding: 12px 25px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #45a049; }
    .message { margin-top: 15px; padding: 12px; border-radius: 5px; display: none; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <h2>Онлайн-запись к мастеру маникюра</h2>
  
  <form id="bookingForm">
    <label>Дата *</label>
    <input type="date" id="date" required>
    <label>Время *</label>
    <input type="time" id="time" required>
    <label>Ваше имя *</label>
    <input type="text" id="name" required placeholder="Анна">
    <label>Телефон *</label>
    <input type="tel" id="phone" required placeholder="+7 (900) 123-45-67">
    <label>Услуга</label>
    <select id="service">
      <option value="">Выберите услугу</option>
      <option>Маникюр</option>
      <option>Педикюр</option>
      <option>Маникюр + покрытие</option>
      <option>Наращивание</option>
    </select>
    <label>Комментарий</label>
    <textarea id="comment" rows="3" placeholder="Ваши пожелания..."></textarea>
    <button type="submit">Записаться</button>
  </form>

  <div id="message" class="message"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPCGNcusCR4ocYGgbW6e0SXAfYM6rcOMTGg1sYKFB7mBGxSLhk4C-Fp6eO6smn5XgShA/exec';

    const form = document.getElementById('bookingForm');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      setTimeout(() => messageDiv.style.display = 'none', 7000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const bookingData = {
        date: document.getElementById('date').value,
        time: document.getElementById('time').value,
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        service: document.getElementById('service').value,
        comment: document.getElementById('comment').value.trim()
      };

      if (!bookingData.date || !bookingData.time || !bookingData.name || !bookingData.phone) {
        showMessage('Пожалуйста, заполните все обязательные поля.', 'error');
        return;
      }

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },   // ← Ключевое изменение
          body: JSON.stringify(bookingData)
        });

        if (!response.ok) throw new Error('Server error');

        const result = await response.json();

        if (result.status === 'success') {
          showMessage(result.message || 'Запись успешно создана!', 'success');
          form.reset();
        } else {
          showMessage(result.message || 'Ошибка при создании записи', 'error');
        }
      } catch (error) {
        console.error(error);
        showMessage('Ошибка соединения. Попробуйте ещё раз.', 'error');
      }
    });
  </script>
</body>
</html>
