<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись к мастеру</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #f5e6f0, #e6f0f5);
      margin: 0;
    }
    #booking-widget {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1, h2 { color: #c2185b; }
    input, button {
      margin: 10px 0;
      padding: 14px;
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    button {
      background: #e91e63;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #c2185b; }
    #slots-container button {
      margin: 6px 6px 6px 0;
      padding: 12px 20px;
      background: #f8bbd0;
      color: #c2185b;
    }
    #slots-container button:hover {
      background: #e91e63;
      color: white;
    }
    .booking-item {
      background: #f9f9f9;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cancel-btn {
      background: #d32f2f;
      padding: 6px 12px;
      font-size: 14px;
    }
    #message { margin-top: 15px; font-weight: 500; min-height: 24px; }
  </style>
</head>
<body>

<div id="booking-widget">
  <h1>Запись к мастеру</h1>

  <label for="date-picker"><strong>Выберите дату:</strong></label><br><br>
  <input type="date" id="date-picker">

  <div id="slots-container" style="margin: 20px 0;"></div>

  <form id="booking-form" style="display: none;">
    <input type="text" id="client-name" placeholder="Ваше имя" required>
    <input type="tel" id="client-phone" placeholder="Телефон" required>
    <button type="submit">Записаться</button>
  </form>

  <div id="message"></div>

  <hr style="margin: 30px 0;">
  <h2>Все записи</h2>
  <div id="all-bookings"></div>
</div>

<script>
  let selectedDate, selectedTime;

  const datePicker = document.getElementById('date-picker');
  const slotsContainer = document.getElementById('slots-container');
  const bookingForm = document.getElementById('booking-form');
  const messageDiv = document.getElementById('message');
  const allBookingsDiv = document.getElementById('all-bookings');

  const allSlots = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];

  // Загрузка записей
  function loadBookings() {
    const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
    allBookingsDiv.innerHTML = '';

    if (bookings.length === 0) {
      allBookingsDiv.innerHTML = '<p>Пока нет записей.</p>';
      return;
    }

    bookings.forEach((booking, index) => {
      const div = document.createElement('div');
      div.className = 'booking-item';
      div.innerHTML = `
                <div>
                    <strong>${booking.date} ${booking.time}</strong><br>
                    ${booking.name} — ${booking.phone}
                </div>
                <button class="cancel-btn" data-index="${index}">Отменить</button>
            `;
      allBookingsDiv.appendChild(div);
    });

    // Обработчики отмены
    document.querySelectorAll('.cancel-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const index = parseInt(btn.getAttribute('data-index'));
        let bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
        bookings.splice(index, 1);
        localStorage.setItem('bookings', JSON.stringify(bookings));
        loadBookings();
        messageDiv.textContent = 'Запись отменена';
      });
    });
  }

  datePicker.addEventListener('change', () => {
    selectedDate = datePicker.value;
    if (!selectedDate) return;

    messageDiv.textContent = '';
    slotsContainer.innerHTML = `<p><strong>Доступные времена на ${selectedDate}:</strong></p>`;

    allSlots.forEach(time => {
      const btn = document.createElement('button');
      btn.textContent = time;
      btn.addEventListener('click', () => {
        selectedTime = time;
        bookingForm.style.display = 'block';
        messageDiv.textContent = `Выбрано: ${time}`;
      });
      slotsContainer.appendChild(btn);
    });
  });

  bookingForm.addEventListener('submit', (e) => {
    e.preventDefault();

    const name = document.getElementById('client-name').value.trim();
    const phone = document.getElementById('client-phone').value.trim();

    if (!name || !phone || !selectedTime) {
      messageDiv.textContent = 'Заполните все поля!';
      return;
    }

    let bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
    bookings.push({
      date: selectedDate,
      time: selectedTime,
      name,
      phone,
      timestamp: new Date().toISOString()
    });
    localStorage.setItem('bookings', JSON.stringify(bookings));

    messageDiv.style.color = 'green';
    messageDiv.textContent = `✅ ${name}, вы записаны на ${selectedDate} в ${selectedTime}!`;
    bookingForm.style.display = 'none';

    loadBookings(); // Обновляем список
  });

  // Загружаем записи при старте
  loadBookings();
</script>

</body>
</html>
